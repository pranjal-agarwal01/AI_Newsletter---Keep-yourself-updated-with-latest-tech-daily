name: AI Newsletter

on:
  schedule:
    # 03:30 / 08:30 / 14:30 UTC = 09:00 / 14:00 / 20:00 IST — 3 issues a day.
    # GitHub cron is best-effort; runs can start a few minutes late.
    - cron: "30 3,8,14 * * *"
  workflow_dispatch: {}

concurrency:
  group: newsletter
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run newsletter pipeline
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_TO: ${{ secrets.DIGEST_TO }}
        run: python run_issue.py

      - name: Save database back to the repo
        run: |
          git config user.name "newsletter-bot"
          git config user.email "actions@users.noreply.github.com"
          git add newsletter.db
          if git diff --cached --quiet; then
            echo "No database changes to save."
          else
            git commit -m "chore: update newsletter.db [skip ci]"
            git pull --rebase origin main
            git push
          fi
